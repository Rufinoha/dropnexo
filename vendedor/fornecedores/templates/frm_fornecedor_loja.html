<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo do fornecedor — {{ MARCA_NOME }}</title>
  {% include "partials/marca_favicon.html" %}
  <link rel="stylesheet" href="{{ url_for('static', filename='style/global_utils.css') }}" />
  <link rel="stylesheet" href="{{ url_for('vd_fornecedores.static', filename='style/Cfornecedor_loja.css') }}?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="Loja_ApoioBody FnPar_ApoioBody">
  <div class="Cl_Header Cl_ApoioHeader" aria-hidden="true">
    <div class="Cl_Logo"><img src="{{ marca_logo_nome_url }}" alt="" /></div>
    <div class="Cl_Titulo"><h1>Catálogo</h1></div>
  </div>

  <input type="hidden" id="id_fornecedor" value="" />

  <div class="Loja_Shell">
    <header class="Loja_Hero" id="lojaHero">
      <div class="Loja_HeroText">
        <span class="Loja_Kicker">Catálogo do fornecedor</span>
        <h1 id="lojaTitulo">Carregando…</h1>
        <p id="lojaSubtitulo" class="Loja_Subtitulo"></p>
        <span id="lojaStatus" class="Loja_StatusBadge"></span>
        <button type="button" class="Loja_BtnVinculoHero Cl_BtnSalvar" id="lojaBtnVinculo" hidden>Solicitar vínculo</button>
      </div>
    </header>

    <div class="Loja_Toolbar">
      <input type="search" id="lojaBusca" placeholder="Buscar produto…" autocomplete="off" />
      <button type="button" class="Cl_BtnPrincipal" id="lojaBtnBuscar">Buscar</button>
    </div>

    <div id="lojaGrid" class="Loja_Grid" aria-live="polite"></div>
    <p id="lojaVazio" class="Loja_Vazio" hidden>Nenhum produto publicado.</p>

    <nav id="lojaPaginacao" class="Loja_Paginacao" hidden aria-label="Paginação"></nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="{{ url_for('static', filename='script/global_utils.js') }}"></script>
  <script src="{{ url_for('vd_fornecedores.static', filename='script/Svinculo_requisitos.js') }}?v=2"></script>
  <script src="{{ url_for('vd_fornecedores.static', filename='script/Sfornecedor_loja.js') }}?v=4"></script>
</body>
</html>
