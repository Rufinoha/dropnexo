<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ titulo_email }}</title>
</head>
<body style="margin:0;padding:0;background:#f5f6f6;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f6f6;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" style="width:640px;max-width:640px;">
          <tr><td style="height:12px;"></td></tr>
          <tr>
            <td style="background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:linear-gradient(135deg,#021F81,#2C6BF3);padding:18px 22px;">
                    <div style="font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;color:#ffffff;line-height:1.2;">
                      DropNexo
                    </div>
                    <div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#E8F0FF;margin-top:6px;">
                      Conectar fornecedores e vendedores
                    </div>
                  </td>
                </tr>
              </table>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:26px 26px 10px 26px;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.7;color:#111827;">
                    {% block conteudo %}{% endblock %}
                  </td>
                </tr>
              </table>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:0 26px;"><div style="height:1px;background:#eef2f7;"></div></td>
                </tr>
              </table>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:18px 26px 22px 26px;" align="center">
                    <div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#6b7280;line-height:1.6;">
                      Este é um e-mail automático. Por favor, não responda.
                    </div>
                    <table role="presentation" cellpadding="0" cellspacing="0" style="margin:12px auto 8px auto;">
                      <tr>
                        <td style="padding:0 6px 6px 6px;">
                          <a href="{{ url_politica_privacidade }}"
                             style="display:inline-block;padding:8px 10px;border:1px solid #e5e7eb;border-radius:999px;background:#ffffff;color:#021F81;text-decoration:none;font-family:Arial,Helvetica,sans-serif;font-size:12px;">
                            Privacidade
                          </a>
                        </td>
                        <td style="padding:0 6px 6px 6px;">
                          <a href="{{ url_politica_interna }}"
                             style="display:inline-block;padding:8px 10px;border:1px solid #e5e7eb;border-radius:999px;background:#ffffff;color:#021F81;text-decoration:none;font-family:Arial,Helvetica,sans-serif;font-size:12px;">
                            Política Interna
                          </a>
                        </td>
                        <td style="padding:0 6px 6px 6px;">
                          <a href="{{ url_dpo }}"
                             style="display:inline-block;padding:8px 10px;border:1px solid #e5e7eb;border-radius:999px;background:#ffffff;color:#021F81;text-decoration:none;font-family:Arial,Helvetica,sans-serif;font-size:12px;">
                            DPO
                          </a>
                        </td>
                      </tr>
                    </table>
                    <div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#9ca3af;margin-top:10px;">
                      © {{ ano }} DropNexo · dropnexo.com.br
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr><td style="height:14px;"></td></tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
