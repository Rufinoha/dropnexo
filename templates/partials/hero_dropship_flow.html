<figure class="pub-hero__viz" aria-labelledby="hero-viz-title">
  <figcaption id="hero-viz-title" class="sr-only">
    Fluxo dropshipping: fornecedor envia do estoque, vendedor revende sem estoque, cliente recebe em casa.
  </figcaption>
  <svg class="pub-hero__svg" viewBox="0 0 920 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
    <defs>
      <linearGradient id="pubFlowLine" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#6ee7b7"/>
        <stop offset="50%" stop-color="#93c5fd"/>
        <stop offset="100%" stop-color="#fcd34d"/>
      </linearGradient>
      <filter id="pubGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- trilha de envio -->
    <path class="pub-hero__path pub-hero__path--a" d="M155 148 C260 148, 300 148, 380 148" stroke="url(#pubFlowLine)" stroke-width="2.5" stroke-dasharray="8 6" stroke-linecap="round"/>
    <path class="pub-hero__path pub-hero__path--b" d="M540 148 C620 148, 660 148, 765 148" stroke="url(#pubFlowLine)" stroke-width="2.5" stroke-dasharray="8 6" stroke-linecap="round"/>

    <!-- pacote animado 1 -->
    <g class="pub-hero__parcel pub-hero__parcel--1">
      <rect x="-14" y="-12" width="28" height="24" rx="4" fill="#fbbf24" stroke="#fff" stroke-width="1.5"/>
      <path d="M-14 -4 H14" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
    </g>
    <g class="pub-hero__parcel pub-hero__parcel--2">
      <rect x="-12" y="-10" width="24" height="20" rx="3" fill="#fbbf24" stroke="#fff" stroke-width="1.5"/>
    </g>

    <!-- FORNECEDOR -->
    <g transform="translate(48, 72)">
      <rect x="0" y="40" width="120" height="88" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)"/>
      <path d="M20 40 L60 12 L100 40" fill="rgba(110,231,183,0.35)" stroke="#6ee7b7" stroke-width="1.5"/>
      <rect x="24" y="72" width="28" height="22" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"/>
      <rect x="58" y="78" width="28" height="16" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"/>
      <rect x="24" y="98" width="62" height="18" rx="3" fill="rgba(255,255,255,0.1)"/>
      <circle cx="100" cy="52" r="14" fill="#059669" fill-opacity="0.9"/>
      <path d="M94 52 L98 56 L106 48" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <text x="60" y="148" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Inter,sans-serif">Fornecedor</text>
      <text x="60" y="166" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-size="10" font-family="Inter,sans-serif">Estoque · embala · envia</text>
    </g>

    <!-- DROPNEXO HUB -->
    <g transform="translate(380, 88)" filter="url(#pubGlow)">
      <circle cx="70" cy="60" r="52" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
      <circle cx="70" cy="60" r="38" fill="rgba(44,107,243,0.45)" stroke="#93c5fd" stroke-width="1.5"/>
      <path d="M55 60 L65 70 L88 48" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="70" y="134" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" font-family="Inter,sans-serif">DropNexo</text>
      <text x="70" y="150" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-size="9.5" font-family="Inter,sans-serif">Conecta · pedido · rastreio</text>
    </g>

    <!-- VENDEDOR -->
    <g transform="translate(620, 76)">
      <rect x="0" y="36" width="110" height="72" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)"/>
      <rect x="12" y="48" width="86" height="48" rx="6" fill="rgba(37,99,235,0.35)" stroke="#93c5fd"/>
      <path d="M22 88 L38 72 L52 80 L68 64 L86 88" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
      <circle cx="88" cy="52" r="10" fill="#2563eb"/>
      <path d="M84 52 L87 55 L92 49" stroke="#fff" stroke-width="1.5"/>
      <rect x="38" y="104" width="34" height="6" rx="3" fill="rgba(251,191,36,0.8)"/>
      <text x="55" y="148" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Inter,sans-serif">Vendedor</text>
      <text x="55" y="166" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-size="10" font-family="Inter,sans-serif">Vende · sem estoque</text>
    </g>

    <!-- CLIENTE -->
    <g transform="translate(800, 82)">
      <path d="M20 88 L20 56 C20 44 30 36 44 36 H56 C70 36 80 44 80 56 V88" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <path d="M12 88 H88" stroke="rgba(255,255,255,0.35)"/>
      <rect x="48" y="52" width="24" height="18" rx="2" fill="#fbbf24" stroke="#fff" stroke-width="1"/>
      <circle cx="60" cy="28" r="12" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)"/>
      <text x="50" y="148" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Inter,sans-serif">Cliente</text>
      <text x="50" y="166" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-size="10" font-family="Inter,sans-serif">Recebe em casa</text>
    </g>

    <!-- selo sem estoque (abaixo dos rótulos, sem sobrepor DropNexo) -->
    <g transform="translate(280, 248)">
      <rect x="0" y="0" width="360" height="36" rx="18" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.22)"/>
      <text x="180" y="23" text-anchor="middle" fill="#fff" font-size="11" font-weight="600" font-family="Inter,sans-serif">Dropshipping · vendedor não armazena produto</text>
    </g>
  </svg>
</figure>
