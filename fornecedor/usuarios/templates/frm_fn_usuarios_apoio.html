<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Usuário — {{ MARCA_NOME }}</title>
  {% include "partials/marca_favicon.html" %}
  <link rel="stylesheet" href="{{ url_for('static', filename='style/global_utils.css') }}" />
  <link rel="stylesheet" href="{{ url_for('config.static', filename='style/Cconfig_crud.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="Cl_Header Cl_ApoioHeader">
    <div class="Cl_Logo">
      <img src="{{ marca_logo_nome_url }}" alt="{{ MARCA_NOME }}" />
    </div>
    <div class="Cl_Titulo"><h1>Usuário da equipe</h1></div>
  </div>

  <input type="hidden" id="id" value="" />

  <div class="Cl_ContainerApoio">
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <div class="Cl_FormCampo" style="flex:1; min-width:220px;">
        <label for="email">E-mail (login)</label>
        <input type="email" id="email" placeholder="usuario@empresa.com" />
      </div>
      <div class="Cl_FormCampo" style="flex:1; min-width:200px;">
        <label for="nome">Nome</label>
        <input type="text" id="nome" />
      </div>
      <div class="Cl_FormCampo" style="min-width:160px;">
        <label for="whatsapp">WhatsApp</label>
        <input type="text" id="whatsapp" />
      </div>
    </div>
    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:10px;">
      <div class="Cl_FormCampo">
        <label for="id_perfil">Perfil de acesso</label>
        <select id="id_perfil"></select>
      </div>
      <div class="Cl_FormCampo" style="display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap;">
        <label class="Cl_Switch">
          <input type="checkbox" id="status" checked />
          <span class="Cl_SwitchSlider"></span>
          <span>Ativo no tenant</span>
        </label>
        <label class="Cl_Switch" id="wrapEnviarConvite">
          <input type="checkbox" id="enviar_convite" checked />
          <span class="Cl_SwitchSlider"></span>
          <span>Enviar convite por e-mail</span>
        </label>
      </div>
    </div>
    <p class="CfgUsu_ConviteHint" id="conviteHint"></p>
    <p class="CfgUsu_ConviteHint">O perfil define quais menus e ações o usuário terá neste tenant.</p>
  </div>

  <div class="Cl_BotoesApoio">
    <button type="button" class="Cl_BtnSalvar" id="btnSalvar">Salvar</button>
    <button type="button" class="Cl_BtnAuxiliar" id="btnReenviar" style="display:none;">Reenviar convite</button>
  </div>

  <script src="{{ url_for('static', filename='script/global_utils.js') }}"></script>
  <script src="{{ url_for('fn_depositos.static', filename='script/Sfn_usuarios_apoio.js') }}"></script>
</body>
</html>
