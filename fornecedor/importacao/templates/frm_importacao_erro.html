<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Erros da importação</title>
  {% include "partials/marca_favicon.html" %}
  <link rel="stylesheet" href="{{ url_for('static', filename='style/global_utils.css') }}" />
  <link rel="stylesheet" href="{{ url_for('fn_importacao.static', filename='style/Cimportacao.css') }}?v=3" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="imp-erro-body">
  <div class="Cl_ContainerApoio">
    <p class="imp-erro-intro" id="impErroIntro">Carregando erros…</p>

    <div class="Cl_TabelaPrincipal imp-erro-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Linha / Ref.</th>
            <th>Nome</th>
            <th>SKU</th>
            <th>Motivo</th>
          </tr>
        </thead>
        <tbody id="impErroTbl"></tbody>
      </table>
    </div>
  </div>
  <script src="{{ url_for('static', filename='script/global_utils.js') }}"></script>
  <script src="{{ url_for('fn_importacao.static', filename='script/Simportacao_erro.js') }}?v=2"></script>
